name: CI

on:

  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest
    
    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Build Docker Image
      run: docker build -t dev-container -f .devcontainer/Dockerfile .      
                
    - name: Configure Project
      run: docker run --rm -u 0:0 -v ${{ github.workspace }}:/workspace -w /workspace dev-container cmake --preset gcc-release
      
    - name: Compile Project
      run: docker run --rm -u 0:0 -v ${{ github.workspace }}:/workspace -w /workspace dev-container cmake --build --preset gcc-release

    - name: Static Analysis
      run: docker run --rm -u 0:0 -v ${{ github.workspace }}:/workspace -w /workspace dev-container cmake --build --preset gcc-release --target analyse